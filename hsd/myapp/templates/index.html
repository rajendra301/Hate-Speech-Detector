<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hate Speech Detector</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- Standard CSS Variables --- */
        :root {
            --bg-app: #131314;
            --bg-card: #1e1f20;
            --bg-hover: #2c2d2e;
            --text-main: #e3e3e3;
            --text-muted: #c4c7c5;
            --border-color: #444746;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-app);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-card); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #5e5e5e; }

        /* --- Header --- */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background-color: var(--bg-app);
            border-bottom: 1px solid rgba(68, 71, 70, 0.3);
            z-index: 10;
        }

        .icon-btn {
            padding: 0.5rem;
            border-radius: 9999px;
            color: var(--text-muted);
            transition: background-color 0.2s;
            background: transparent;
            border: none;
            cursor: pointer;
        }
        .icon-btn:hover { background-color: var(--bg-card); }

        /* --- Layout --- */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100%;
            width: 100%;
            max-width: 64rem; /* max-w-5xl */
            margin: 0 auto;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding-top: 2rem;
            padding-left: 1rem;
            padding-right: 1rem;
            scroll-behavior: smooth;
        }

        /* --- Empty State --- */
        .empty-state-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            animation: fadeIn 0.3s ease-out forwards;
        }

        .logo-circle {
            width: 4rem;
            height: 4rem;
            border-radius: 9999px;
            background: linear-gradient(to top right, #3b82f6, #22d3ee);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.2);
        }

        .hero-title {
            font-size: 2.25rem;
            font-weight: 500;
            background: linear-gradient(to right, #bfdbfe, #e9d5ff, #fbcfe8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.75rem;
            letter-spacing: -0.025em;
        }

        .suggestion-card {
            padding: 1rem;
            border-radius: 0.75rem;
            background-color: var(--bg-card);
            text-align: left;
            transition: all 0.2s;
            border: 1px solid transparent;
            cursor: pointer;
            width: 100%;
        }
        .suggestion-card:hover {
            background-color: var(--bg-hover);
            border-color: var(--border-color);
        }

        /* --- Input Area --- */
        .input-section {
            background-color: var(--bg-app);
            padding-bottom: 1.5rem;
            padding-top: 0.5rem;
            padding-left: 1rem;
            padding-right: 1rem;
            z-index: 20;
        }

        .input-box-wrapper {
            max-width: 48rem;
            margin: 0 auto;
            background-color: var(--bg-card);
            border-radius: 1.5rem;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: relative;
            transition: background-color 0.2s;
        }
        .input-box-wrapper:focus-within {
            background-color: var(--bg-hover);
            border-color: #5e5e5e;
        }

        .chat-textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 1rem 1.5rem;
            min-height: 60px;
            max-height: 200px;
            resize: none;
            font-size: 1rem;
        }
        .chat-textarea:focus { outline: none; }
        .chat-textarea::placeholder { color: #8e918f; }

        .send-btn {
            padding: 0.5rem;
            border-radius: 9999px;
            transition: all 0.2s;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-btn-disabled {
            background-color: var(--bg-hover);
            color: var(--border-color);
            cursor: not-allowed;
        }
        .send-btn-active {
            background-color: var(--text-main);
            color: var(--bg-card);
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }
        .send-btn-active:hover { background-color: white; }

        /* --- Messages --- */
        .msg-row {
            width: 100%;
            max-width: 48rem;
            margin: 0 auto 2rem auto;
            animation: fadeIn 0.3s ease-out forwards;
            display: flex;
            gap: 1rem;
        }
        
        .avatar-user {
            width: 2rem;
            height: 2rem;
            border-radius: 9999px;
            background-color: #2563eb;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
        }
        
        .avatar-ai {
            width: 2rem;
            height: 2rem;
            border-radius: 9999px;
            background: linear-gradient(to top right, #60a5fa, #c084fc, #f87171);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            animation: pulseSlow 3s infinite;
        }

        .msg-content {
            color: var(--text-main);
            line-height: 1.625;
            white-space: pre-wrap;
        }

        /* Warning Overlay */
        .warning-overlay {
            position: absolute;
            inset: 0;
            background-color: rgba(30, 31, 32, 0.9);
            backdrop-filter: blur(4px);
            z-index: 10;
            border-radius: 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            border: 1px solid rgba(127, 29, 29, 0.3);
        }
        
        .blurred-content {
            filter: blur(4px);
            user-select: none;
            opacity: 0.5;
            transition: all 0.3s;
        }

        /* Badges */
        .badge-toxic {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.25rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid #991b1b;
            background-color: rgba(127, 29, 29, 0.2);
            color: #fca5a5;
        }
        
        .badge-safe {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.25rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid #166534;
            background-color: rgba(20, 83, 45, 0.2);
            color: #86efac;
        }

        .badge-conf {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
        }

        /* --- Animations --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseSlow { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }
        
        /* Helpers */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header class="app-header">
        <div style="display: flex; align-items: center; gap: 0.5rem;">
            <span style="font-weight: 700; font-size: 1.125rem;">Hate Speech Detector</span>
        </div>
        <button onclick="resetChat()" class="icon-btn" title="New Detection">
            <i data-lucide="plus" class="w-5 h-5"></i>
        </button>
    </header>

    <div class="main-container">
        
        <div id="chat-container" class="chat-area">
            <div id="empty-state" class="empty-state-container">
                <div class="logo-circle">
                    <i data-lucide="sparkles" class="w-8 h-8 text-white"></i>
                </div>
                <h1 class="hero-title">Hello, Human</h1>
                <h2 style="font-size: 1.5rem; color: #444746; margin-bottom: 2rem;">
                    How can I help detect content today?
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 max-w-4xl w-full">
                    <button onclick="fillInput('Check this comment for toxicity')" class="suggestion-card">
                        <span style="font-size: 0.875rem; color: #e3e3e3;">Check a comment for toxicity</span>
                    </button>
                    <button onclick="fillInput('Analyze this social media post')" class="suggestion-card">
                        <span style="font-size: 0.875rem; color: #e3e3e3;">Analyze a social media post</span>
                    </button>
                    <button onclick="fillInput('Draft a safe response')" class="suggestion-card">
                        <span style="font-size: 0.875rem; color: #e3e3e3;">Draft a safe response</span>
                    </button>
                </div>
            </div>

            <div id="messages-list" class="max-w-4xl mx-auto pb-32 pt-4 hidden"></div>
            
            <div id="loading-indicator" class="hidden max-w-3xl mx-auto px-4 md:px-0">
                 <div class="flex gap-4 animate-pulse">
                   <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-400 via-purple-400 to-red-400 opacity-50"></div>
                   <div class="flex-grow space-y-2 mt-2">
                      <div class="h-4 bg-[#2c2d2e] rounded w-1/4"></div>
                      <div class="h-4 bg-[#2c2d2e] rounded w-3/4"></div>
                   </div>
                </div>
            </div>
        </div>

        <div class="input-section">
            <div class="input-box-wrapper">
                <textarea
                    id="user-input"
                    placeholder="Enter text here to check for hate speech..."
                    class="chat-textarea"
                    rows="1"
                    style="height: auto; min-height: 60px;"
                ></textarea>
                
                <div class="flex items-center justify-between px-4 pb-3">
                    <div class="flex gap-2 text-[#e3e3e3]">
                        <button class="icon-btn" title="Upload image">
                            <i data-lucide="plus" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <button id="send-btn" class="send-btn send-btn-disabled" disabled>
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </div> 
            </div>
            <p class="text-center text-[11px] text-[#8e918f] mt-3">
                Detector may display inaccurate info, so double-check its responses.
            </p>
        </div>
    </div>

    <script>
        // --- Icons Initialization ---
        function initIcons() {
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }
        window.addEventListener('load', initIcons);

        // --- State & Elements ---
        const triggerWords = ['hate', 'stupid', 'ugly', 'worst', 'idiot', 'kill', 'attack', 'trash', 'fuck','lado','sumiran','sandesh','muji','machikne'];
        const chatContainer = document.getElementById('chat-container');
        const emptyState = document.getElementById('empty-state');
        const messagesList = document.getElementById('messages-list');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const loadingIndicator = document.getElementById('loading-indicator');

        // --- Functions ---
        function resetChat() {
            messagesList.innerHTML = '';
            messagesList.classList.add('hidden');
            emptyState.classList.remove('hidden');
        }

        function fillInput(text) {
            userInput.value = text;
            userInput.focus();
            updateSendButtonState();
        }

        function updateSendButtonState() {
            if (userInput.value.trim().length > 0) {
                sendBtn.classList.replace('send-btn-disabled', 'send-btn-active');
                sendBtn.disabled = false;
            } else {
                sendBtn.classList.replace('send-btn-active', 'send-btn-disabled');
                sendBtn.disabled = true;
            }
        }

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            updateSendButtonState();
        });

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        sendBtn.addEventListener('click', handleSend);

        // --- Logic ---
        async function checkHateSpeech(text) {
            // Send data to Django Backend
            try {
                const response = await fetch('/predict/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text: text })
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                const data = await response.json();
                
                // The backend returns { isHateSpeech: true/false, confidence: 0.xx }
                return { 
                    isHateSpeech: data.isHateSpeech, 
                    confidence: data.confidence 
                };

            } catch (error) {
                console.error("Error connecting to model:", error);
                // Fallback just in case server is down
                return { isHateSpeech: false, confidence: 0.0 };
            }
        }

        function createPostHTML(role, text, analysis = null, id) {
            const isUser = role === 'user';
            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const userIcon = `<div class="avatar-user"><i data-lucide="user" class="w-4 h-4"></i></div>`;
            const aiIcon = `<div class="avatar-ai"><i data-lucide="sparkles" class="w-4 h-4 text-white"></i></div>`;

            let contentHtml = '';
            let badgesHtml = '';

            if (isUser) {
                contentHtml = `<div class="msg-content">${text}</div>`;
            } else {
                if (analysis.isHateSpeech) {
                    contentHtml = `
                        <div class="relative" id="post-${id}">
                            <div id="overlay-${id}" class="warning-overlay">
                                <div style="display:flex; align-items:center; gap:0.5rem; color:#f87171; margin-bottom:0.5rem;">
                                    <i data-lucide="alert-triangle" class="w-5 h-5"></i>
                                    <span style="font-weight:500; font-size:0.875rem;">Potential Hate Speech</span>
                                </div>
                                <button onclick="revealPost(${id})" style="padding:0.375rem 1rem; background-color:#2c2d2e; color:#e3e3e3; border-radius:9999px; border:1px solid #444746; font-size:0.75rem; display:flex; align-items:center; gap:0.5rem; cursor:pointer;">
                                    <i data-lucide="eye" class="w-3 h-3"></i> View Content
                                </button>
                            </div>
                            <div id="content-${id}" class="blurred-content">${text}</div>
                        </div>`;
                    badgesHtml = `
                        <div class="mt-4 flex flex-wrap gap-2">
                            <div class="badge-toxic"><i data-lucide="alert-triangle" class="w-3 h-3"></i> Flagged: Toxic</div>
                            <span class="badge-conf">
                                Confidence: ${(analysis.confidence * 100).toFixed(0)}%
                            </span>
                        </div>`;
                } else {
                    contentHtml = `<div class="msg-content">${text}</div>`;
                    badgesHtml = `
                        <div class="mt-4 flex flex-wrap gap-2">
                            <div class="badge-safe"><i data-lucide="sparkles" class="w-3 h-3"></i> Safe Content</div>
                        </div>`;
                }
            }

            return `
                <div class="msg-row">
                    <div style="flex-shrink:0; margin-top:0.25rem;">${isUser ? userIcon : aiIcon}</div>
                    <div style="flex-grow:1; min-width:0;">
                        <div style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.25rem;">
                            <span style="font-weight:600; font-size:0.875rem; color:#e3e3e3;">${isUser ? 'You' : 'Detector AI'}</span>
                            <span style="font-size:0.75rem; color:#8e918f;">${timestamp}</span>
                        </div>
                        <div style="position:relative;">${contentHtml}${badgesHtml}</div>
                    </div>
                </div>`;
        }

        function revealPost(id) {
            const overlay = document.getElementById(`overlay-${id}`);
            const content = document.getElementById(`content-${id}`);
            overlay.style.opacity = '0';
            setTimeout(() => overlay.remove(), 300);
            content.classList.remove('blurred-content');
        }

        async function handleSend() {
            const text = userInput.value;
            if (!text.trim()) return;

            if (!messagesList.classList.contains('hidden')) { /* already active */ }
            else { emptyState.classList.add('hidden'); messagesList.classList.remove('hidden'); }

            messagesList.insertAdjacentHTML('beforeend', createPostHTML('user', text));
            initIcons();
            
            userInput.value = '';
            userInput.style.height = '60px';
            updateSendButtonState();
            chatContainer.scrollTop = chatContainer.scrollHeight;
            loadingIndicator.classList.remove('hidden');

            try {
                const analysis = await checkHateSpeech(text);
                loadingIndicator.classList.add('hidden');
                messagesList.insertAdjacentHTML('beforeend', createPostHTML('model', text, analysis, Date.now()));
                initIcons();
                chatContainer.scrollTop = chatContainer.scrollHeight;
            } catch (error) { console.error("Error", error); loadingIndicator.classList.add('hidden'); }
        }
    </script>
</body>
</html>
